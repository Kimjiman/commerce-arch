spring:
  application:
    name: basicarch
  config:
    import:
      - classpath:jwt.yml
      - classpath:cron.yml
  mvc:
    static-path-pattern: /static/**
    throw-exception-if-no-handler-found: true
  sql:
    init:
      platform: postgresql
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h
  profiles:
    default: local
  kafka:
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="1234";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: basic-arch
      auto-offset-reset: earliest # earliest: 토픽에 쌓인 가장 오래된 메시지부터, latest 등록 시점 이후에 들어오는 메시지만
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

web-client:
  domains:
    default:
      base-url: http://localhost:8080
      connect-timeout: 5000
      read-timeout: 10000
      write-timeout: 10000
      headers:
        Content-Type: application/json
        Accept: '*/*'

springdoc:
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    path: /swagger-ui.html
    url: ${springdoc.api-docs.path}
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    build:
      enabled: true
    env:
      enabled: true

info:
  app:
    name: basicarch
    description: basicarch

cache:
  publisher: redis
